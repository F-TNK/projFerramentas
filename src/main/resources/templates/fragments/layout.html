<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="base(conteudo)">
    <head>
        <meta charset="UTF-8">
        <title>Gestão de Ferramentas Industriais</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body>
        <nav class="navbar navbar-dark bg-dark px-4 mb-4">
            <span class="navbar-brand fw-bold">Gestão de Ferramentas Industriais</span>
        </nav>
        <div class="container">
            <div th:replace="${conteudo}"></div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
        
       <script> // INFOS EM BALAO Flutuante

       document.addEventListener('DOMContentLoaded', function () {
           const tooltipTriggerList =
               document.querySelectorAll('[data-bs-toggle="tooltip"]');
           [...tooltipTriggerList].forEach(
               tooltipTriggerEl =>
                   new bootstrap.Tooltip(tooltipTriggerEl)
           );
       });

       </script>
    </body>
</html>
