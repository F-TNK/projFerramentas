<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: base(~{::main})}">
    <head>
        <title>Ferramentas</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        
        <main class="card shadow-sm p-4"> 
            
            <h2 class="mb-4">Lista de Ferramentas</h2>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col" style="width: 10%;">ID</th>
                            <th scope="col" style="width: 30%;">Nome</th>
                            <th scope="col" style="width: 20%;">Horas de Uso</th>
                            <th scope="col" style="width: 20%;">Vida Útil Máxima</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ferramenta : ${ferramentas}">
                            <th scope="row" th:text="${ferramenta.id}">1</th>
                            <td th:text="${ferramenta.nome}">Nome da Ferramenta</td>
                            <td>
                                <span class="badge bg-secondary" th:text="${ferramenta.horasDeUso} + 'h'"></span>
                            </td>
                            <td>
                                <span class="badge bg-info text-dark" th:text="${ferramenta.vidaUtilMaxima} + 'h'"></span>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(ferramentas)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                Nenhuma ferramenta cadastrada no banco de dados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <hr><!---------------------- NOVA FERRAMENTA ---------------------->
            
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Cadastrar Nova Ferramenta</h4>
                <button class="btn btn-outline-primary" type="button"
                        data-bs-toggle="collapse" data-bs-target="#formCadastro"
                        aria-expanded="false" aria-controls="formCadastro">
                    + Nova Ferramenta
                </button>
            </div>
            <div class="collapse" id="formCadastro">
                <form th:action="@{/ferramentas/salvar}" th:object="${ferramenta}" method="POST" class="w-50">
                    <div class="mb-3">
                        <label class="form-label">Nome:</label>
                        <input type="text" th:field="*{nome}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Horas de Uso:</label>
                        <input type="number" th:field="*{horasDeUso}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Vida Útil Máxima:</label>
                        <input type="number" th:field="*{vidaUtilMaxima}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Ferramenta</button>
                </form>
            </div>
            
            <!---------------------- Mensagem ---------------------->
            
            <div th:if="${sucesso}"
                class="alert alert-success">
               <span th:text="${sucesso}"></span>
           </div>
            
            <hr><!---------------------- CARDS ---------------------->
            
             <h4 class="mb-4">Gerenciamento de Ferramentas</h4>

            <div class="row">
                <div class="col-md-4 mb-4"
                     th:each="ferramenta : ${ferramentas}">
                    <div th:replace="~{fragments/cardFerramenta :: cardFerramenta(${ferramenta})}">
                    </div>
                </div>
            </div>
             
            
        </main>
    </body>
</html>
